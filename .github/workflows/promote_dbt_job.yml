name: Promote dbt Job

on:
  push:
    branches:
      - main # set to a release branch
  workflow_dispatch:
    inputs:
      prd_job_id:
        description: "PRD Job ID (leave empty to CREATE a new job)"
        required: false
        default: ""

# Global environment mapping to replace the ADO variable group 'dbt-cloud-secrets'
env:
  DBT_STG_TOKEN: ${{ secrets.DBT_STG_TOKEN }}
  DBT_PRD_TOKEN: ${{ secrets.DBT_PRD_TOKEN }}
  DBT_STG_ACCOUNT_ID: ${{ vars.DBT_STG_ACCOUNT_ID }}
  DBT_PRD_ACCOUNT_ID: ${{ vars.DBT_PRD_ACCOUNT_ID }}
  DBT_STG_JOB_ID: ${{ vars.DBT_STG_JOB_ID }}
  DBT_PRD_ENV_ID: ${{ vars.DBT_PRD_ENV_ID }}

jobs:

  # ── Stage 1: Validate & Preview ──────────────────────────────────────────
  validate:
    name: Fetch & Preview STG Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Preview STG job definition
        run: python scripts/promote_dbt_job.py
        env:
          DBT_PRD_JOB_ID: ${{ github.event.inputs.prd_job_id }}
          DRY_RUN: "true" # Uses the safe preview check we added to the Python script

  # ── Stage 2 & 3: Manual Approval Gate & Promote to PRD ───────────────────
  promote:
    name: Promote Job to PRD
    needs: validate # Ensures validation stage completes successfully first
    runs-on: ubuntu-latest
    environment: "dbt-prd" # Tie to a GitHub Environment for audit trail & manual approval gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Promote STG → PRD
        run: python scripts/promote_dbt_job.py
        env:
          DBT_PRD_JOB_ID: ${{ github.event.inputs.prd_job_id }}
          DRY_RUN: "false" # Executes the live API requests to create/update
